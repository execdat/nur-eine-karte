<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nur eine Karte</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="scene" id="scene">

    <!-- Envelope / Card wrapper -->
    <div class="envelope-wrapper" id="envelope-wrapper">
      <div class="envelope" id="envelope">
        <div class="envelope-paper"></div>
        <div class="envelope-side envelope-side--left"></div>
        <div class="envelope-side envelope-side--right"></div>
        <div class="envelope-bottom">
          <p class="tap-hint">Tippen zum Öffnen</p>
        </div>
        <div class="envelope-flap-shadow"></div>
        <div class="envelope-flap"></div>
      </div>
    </div>

    <!-- The 3 mini cards + ticker, revealed after envelope opens -->
    <div class="card-wrapper hidden" id="card-wrapper">
      <p class="mini-hint">Tippen zum Umdrehen</p>

      <div class="mini-cards">

        <!-- Card 1 -->
        <div class="mini-card" id="mini-card-0">
          <div class="mini-card-inner">
            <div class="mini-card-front">
              <span class="mc-corner mc-tl">♠</span>
              <div class="qr-placeholder"><span>QR</span></div>
              <span class="mc-corner mc-br">♣</span>
            </div>
            <div class="mini-card-back">
              <!-- Riddle 1 — edit text here -->
              <p class="riddle-text">Rätsel 1<br/>kommt hier hin.</p>
            </div>
          </div>
        </div>

        <!-- Card 2 -->
        <div class="mini-card" id="mini-card-1">
          <div class="mini-card-inner">
            <div class="mini-card-front">
              <span class="mc-corner mc-tl mc-corner--red">♥</span>
              <div class="qr-placeholder"><span>QR</span></div>
              <span class="mc-corner mc-br mc-corner--red">♦</span>
            </div>
            <div class="mini-card-back">
              <!-- Riddle 2 — edit text here -->
              <p class="riddle-text">Rätsel 2<br/>kommt hier hin.</p>
            </div>
          </div>
        </div>

        <!-- Card 3 -->
        <div class="mini-card" id="mini-card-2">
          <div class="mini-card-inner">
            <div class="mini-card-front">
              <span class="mc-corner mc-tl">♣</span>
              <div class="qr-placeholder"><span>QR</span></div>
              <span class="mc-corner mc-br">♠</span>
            </div>
            <div class="mini-card-back">
              <!-- Riddle 3 — edit text here -->
              <p class="riddle-text">Rätsel 3<br/>kommt hier hin.</p>
            </div>
          </div>
        </div>

      </div>

      <!-- Pun news ticker -->
      <div class="ticker-wrapper">
        <div class="ticker-track" id="ticker-track">
          <!-- filled by JS from PUNS array -->
        </div>
      </div>
    </div>

    <!-- Final message -->
    <div class="final-message hidden" id="final-message">
      <div class="final-inner">
        <p class="final-emoji">🎂</p>
        <p class="final-title">Alles Gute zum Geburtstag!</p>
        <p class="final-body">
          Du hast um eine Karte gebeten. Wir haben geliefert.<br />
          Technisch gesehen.<br />
          <em>Card-lich Glückwunsch.</em>
        </p>
        <p class="final-suits">♠ ♥ ♣ ♦</p>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
